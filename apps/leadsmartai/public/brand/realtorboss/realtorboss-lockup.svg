<svg viewBox="0 0 920 240" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="RealtorBoss - Your AI Real Estate Team">
  <!-- RealtorBoss horizontal lockup: mark + two-tone wordmark + tagline.
       Text uses a web-safe geometric-sans stack; in-app, prefer the
       RealtorBossLogo React component (renders with the app font). -->
  <g transform="translate(16 12) scale(1.08)">
    <g stroke="#0B1F44" stroke-width="16">
      <path d="M84 26 V112" />
      <path d="M84 34 H118 Q136 34 136 52 V54 Q136 72 118 72 H102" />
      <path d="M104 72 L131 106" />
    </g>
    <path d="M76 112 H140" stroke="#0B1F44" stroke-width="10" />
    <g stroke="#0B1F44" stroke-width="9">
      <path d="M82 114 L48 142" />
      <path d="M100 114 V142" />
      <path d="M134 114 L152 142" />
    </g>
    <g>
      <circle cx="48" cy="151" r="13" fill="#FFFFFF" stroke="#0B1F44" stroke-width="8" />
      <circle cx="48" cy="151" r="6.5" fill="#D4A017" />
      <circle cx="100" cy="151" r="13" fill="#FFFFFF" stroke="#0B1F44" stroke-width="8" />
      <circle cx="100" cy="151" r="6.5" fill="#D4A017" />
      <circle cx="152" cy="151" r="13" fill="#FFFFFF" stroke="#0B1F44" stroke-width="8" />
      <circle cx="152" cy="151" r="6.5" fill="#D4A017" />
    </g>
  </g>
  <text x="262" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="100" letter-spacing="-2">
    <tspan fill="#0B1F44">Realtor</tspan><tspan fill="#D4A017">Boss</tspan>
  </text>
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <!-- Tagline centered under the wordmark (wordmark spans ~262-800, center 531) -->
    <line x1="287" y1="166" x2="333" y2="166" stroke="#D4A017" stroke-width="4" />
    <text x="531" y="176" text-anchor="middle" fill="#0B1F44" font-weight="600" font-size="25" letter-spacing="1.5">YOUR AI REAL ESTATE TEAM</text>
    <line x1="729" y1="166" x2="775" y2="166" stroke="#D4A017" stroke-width="4" />
  </g>
</svg>
