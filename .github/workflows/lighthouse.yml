# Lighthouse CI — Core Web Vitals monitoring against propertytoolsai.com.
#
# Scope per validation report PERF-01: we need a CWV baseline so future
# ship regressions are visible. This workflow runs Lighthouse against the
# live production site and uploads full HTML reports as build artifacts.
#
# Triggers:
#   - On schedule (weekdays at 13:00 UTC / 09:00 ET) — catches regressions
#     within a day of shipping.
#   - On manual dispatch — so a dev can run it after a risky ship.
#
# Thresholds are `error` (not `warn`) — the baseline capture period is
# over and LHCI assertion failures now fail the job. Current gates in
# .lighthouserc.json:
#   - performance >= 0.85, accessibility >= 0.9, best-practices >= 0.9,
#     seo >= 0.95
#   - LCP < 2.5s (validation report PERF-01)
#   - CLS < 0.1
#   - TBT < 200ms  (proxy for INP < 200ms — LHCI doesn't measure INP
#     directly, TBT is the closest lab equivalent)
#   - interactive stays at warn — legacy TTI metric, noisy; we track it
#     but don't gate on it.

name: Lighthouse CI

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      target_host:
        description: "Override target host (defaults to production)"
        required: false
        default: "https://propertytoolsai.com"

jobs:
  lighthouse:
    name: Run Lighthouse on production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.inputs.target_host || 'https://propertytoolsai.com' }}/
            ${{ github.event.inputs.target_host || 'https://propertytoolsai.com' }}/home-value
            ${{ github.event.inputs.target_host || 'https://propertytoolsai.com' }}/pricing
            ${{ github.event.inputs.target_host || 'https://propertytoolsai.com' }}/methodology
            ${{ github.event.inputs.target_host || 'https://propertytoolsai.com' }}/home-value/austin-tx
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

# NEXT STEPS:
#
#   1. Wire to Vercel preview deployments so each PR gets Lighthouse
#      signal BEFORE merging, not only on the scheduled run. Requires:
#        - Vercel deployment-ready webhook, OR
#        - Waiting on the GitHub deployment status from Vercel.
#      Hook the `deployment_status` event and run this workflow against
#      the preview URL — that's the path most Next/Vercel setups use.
#
#   2. Add axe-core (accessibility) to a parallel workflow against the
#      same URL set. LHCI's accessibility category score is a lightweight
#      a11y check; axe-core catches violations LHCI misses and emits them
#      as structured rule IDs for targeted fixes.
#
#   3. If real-user INP starts missing the 200ms goal, consider moving
#      TBT from 200ms → tighter (150ms) as a leading indicator. CrUX
#      field data via PageSpeed Insights API is the authoritative source
#      once the site has enough traffic to qualify.
