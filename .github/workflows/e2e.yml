# Playwright E2E — calculator test suite against propertytoolsai.
#
# Scope per validation report QA-02: deterministic regression coverage on
# the five primary calculators. Runs on PR + push to main. Uses pnpm for
# parity with the dev/build pipeline.

name: E2E — Calculators

on:
  pull_request:
    paths:
      - "apps/propertytoolsai/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium + mobile-safari)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/propertytoolsai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run E2E tests
        env:
          # Disable network-dependent features during tests.
          NEXT_PUBLIC_SITE_URL: http://localhost:3001
        run: pnpm test:e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: apps/propertytoolsai/playwright-report/
          retention-days: 14
